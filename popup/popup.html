<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>WhatsMD</title>
  <link rel="stylesheet" href="popup.css" />
</head>
<body>
  <div class="container">
    <div class="logo">
      <span class="logo-icon">💬</span>
      <span class="logo-text">WhatsMD</span>
    </div>

    <p class="subtitle">Exportar conversa para <code>.md</code></p>

    <button id="exportBtn">Exportar conversa</button>

    <p class="hint">Só as mensagens já carregadas na tela são exportadas — role a conversa para cima para incluir mais.</p>

    <div id="status" class="status hidden"></div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
